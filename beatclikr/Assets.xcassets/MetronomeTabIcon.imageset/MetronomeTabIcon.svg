<svg xmlns="http://www.w3.org/2000/svg" viewBox="6.75 7.55 86.5 86.5" width="25" height="25">
  <!-- Body outline only (no fill, so inner markings show through) -->
  <path fill="none" stroke="black" stroke-width="4.5" stroke-linejoin="round"
        d="M 35.9 9.8 L 64.1 9.8 Q 69.3 9.8 72.5 14.5 L 85.5 86.9 Q 85.5 91.8 80.7 91.8 L 19.3 91.8 Q 14.5 91.8 14.5 86.9 L 27.5 14.5 Q 30.7 9.8 35.9 9.8 Z"/>

  <!-- Vertical center staff -->
  <rect x="48.8" y="15.6" width="2.3" height="42" rx="1.2" fill="black"/>

  <!-- Horizontal scale marks (scaled from originals, narrowest at top/bottom) -->
  <rect x="42.8" y="19.5" width="14.5" height="2.7" rx="1.2" fill="black"/>
  <rect x="41.6" y="27.8" width="16.8" height="2.7" rx="1.2" fill="black"/>
  <rect x="40.3" y="36.6" width="19.5" height="2.9" rx="1.4" fill="black"/>
  <rect x="41.6" y="45.1" width="16.8" height="2.7" rx="1.2" fill="black"/>
  <rect x="42.8" y="53.5" width="14.5" height="2.7" rx="1.2" fill="black"/>

  <!-- Pivot ellipse (at body centre, lower section) -->
  <ellipse cx="50" cy="63.3" rx="8.8" ry="5.4" fill="black"/>

  <!-- Bottom marker (lower body) -->
  <rect x="43.8" y="73.7" width="12.5" height="3.1" rx="1.6" fill="black"/>

  <!-- Pendulum rod -->
  <line x1="50" y1="60.5" x2="82" y2="18.1" stroke="black" stroke-width="4.1" stroke-linecap="round"/>

  <!-- Pendulum weight -->
  <circle cx="75.1" cy="26.2" r="6.8" fill="black"/>
</svg>
